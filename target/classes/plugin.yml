name: RoulettePlugin
version: 1.0.0
main: com.example.roulette.RoulettePlugin
api-version: '1.21'
commands:
  roulette:
    description: Apre la GUI della roulette
    usage: /roulette
    permission: roulette.use
  chips:
    description: Gestisce le chips
    usage: /chips [add|subtract] <player> <amount>
    permission: roulette.chips
